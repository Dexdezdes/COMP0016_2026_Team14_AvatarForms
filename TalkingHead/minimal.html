<!DOCTYPE html>
<html>
<head>
  <title>Talking Head - minimal example</title>

  <style>
    body, html { width:100%; height:100%; max-width: 800px; margin: auto; position: relative; background-color: #202020; color: white; }
    #avatar { display: block; width:100%; height:100%; }
    #controls { display: block; position: absolute; top: 10px; left: 10px; right: 10px; height: 50px; }
    #text { position: absolute; width: Calc( 100% - 110px ); height: 100%; top: 0; left: 0; bottom: 0; right: 110px; font-family: Arial; font-size: 20px; }
    #speak { display: block; position: absolute; top: 0; bottom: 0; right: 0; height: 100%; width: 100px; font-family: Arial; font-size: 20px; }
    #loading { display: block; position: absolute; bottom: 10px; left: 10px; right: 10px; height: 50px; font-family: Arial; font-size: 20px; }
  </style>

  <script type="importmap">
  { "imports":
    {
      "three": "./three.module.js",
      "three/core": "./three.module.js",
      "three/addons/": "./jsm/",
      "talkinghead": "./talkinghead.mjs",
      "lipsync-en": "./lipsync-en.mjs"
    }
  }
  </script>

  <script type="module">
    import { TalkingHead } from "talkinghead";
    import { LipsyncEn } from "lipsync-en";

    let head;
    const lipsync = new LipsyncEn();

  async function speakSequence(lines, delays) {
    for (let i = 0; i < lines.length; i++) {
      if (i > 0) {
        await new Promise(resolve => setTimeout(resolve, delays[i - 1]));
      }
      await head.speakText(lines[i]);
    }
  }

  window.speakSequence = speakSequence;


    document.addEventListener('DOMContentLoaded', async function(e) {

      const nodeAvatar = document.getElementById('avatar');

      head = new TalkingHead( nodeAvatar, {
        lipsyncModules: ["en"],
        cameraView: "upper",
        ttsEngine: "none",    
        ttsEndpoint: ""    
      });

      head.opt.ttsEndpoint = null;

      // Load and show the avatar
      const nodeLoading = document.getElementById('loading');

      var lines = [
        "Hi there! To start with, could you tell me what your name is?",
        "Sure, Adam — could you share your last name with me as well? That’ll help me make sure I have your full name correct.",
        "Thanks, Adam Smith! How was your sleep last night?",
        "Fair enough. Did you wake up feeling rested, or still a bit tired?",
        "I see. Do you often wake up feeling tired, or was last night just an exception?",
      ];
      var line;

      try {
        nodeLoading.textContent = "Loading...";
        await head.showAvatar( {
          url: './brunette.glb',
          // url: 'https://models.readyplayer.me/65a8dba831b23abb4f401bae.glb?morphTargets=ARKit,Oculus+Visemes,mouthOpen,mouthSmile,eyesClosed,eyesLookUp,eyesLookDown&textureSizeLimit=1024&textureFormat=png',
          // url: "ready_player_me_male_avatar__vrchatgame.glb",66473ec24c3b647e2d45ab9b.glb
          // url: 'https://models.readyplayer.me/664777277ad2faec5b6079f0.glb?morphTargets=ARKit,Oculus+Visemes,mouthOpen,mouthSmile,eyesClosed,eyesLookUp,eyesLookDown&textureSizeLimit=1024&textureFormat=png',
          // url: 'https://models.readyplayer.me/66473ec24c3b647e2d45ab9b.glb?morphTargets=ARKit,Oculus+Visemes,mouthOpen,mouthSmile,eyesClosed,eyesLookUp,eyesLookDown&textureSizeLimit=1024&textureFormat=png',
          body: 'F',
          avatarMood: 'neutral',
          ttsLang: "en-GB",
          lipsyncLang: 'en',
        // await head.showAvatar( {
        //   url: 'https://drive.google.com/uc?export=download&id=1AlDS5k1sLYVnCGHoCCpceo-RX9U_vNGX',
        //   body: 'M',
        //   avatarMood: 'neutral',
        //   ttsLang: "en-GB",
        //   ttsVoice: "en-GB-Standard-A",
        //   lipsyncLang: 'en'
        }, (ev) => {
          if ( ev.lengthComputable ) {
            let val = Math.min(100,Math.round(ev.loaded/ev.total * 100 ));
            nodeLoading.textContent = "Loading " + val + "%";
          }
        });
        nodeLoading.style.display = 'none';
      } catch (error) {
        console.log(error);
        nodeLoading.textContent = error.toString();
      }

      // // Speak when clicked
      // const nodeSpeak = document.getElementById('speak');
      // nodeSpeak.addEventListener('click', function () {
      //   try {
      //     const text = document.getElementById('text').value;
      //     if ( text ) {
      //       head.speakText( text );
      //     }
      //   } catch (error) {
      //     console.log(error);
      //   }
      // });

      // Pause animation when document is not visible
      document.addEventListener("visibilitychange", async function (ev) {
        if (document.visibilityState === "visible") {
          head.start();
        } else {
          head.stop();
        }
      });

    // On keypress
    document.addEventListener('keydown', async function(e) {
      if (e.key === 's') {
        try {
          if (head.audioCtx && head.audioCtx.state === 'suspended') {
            await head.audioCtx.resume();
          }

          line = lines.shift();
          if (line) {
            const utterance = new SpeechSynthesisUtterance(line);
            const voices = window.speechSynthesis.getVoices();

            // 1. FUZZY VOICE SELECTION (The Cross-Platform Fix)
            // Order: High-quality Mac -> Windows Zira -> Any English Female -> Any English
            const voice = voices.find(v => v.name.includes('Enhanced') && v.name.includes('Samantha')) ||
                          voices.find(v => v.name.includes('Samantha')) ||
                          voices.find(v => v.name.includes('Zira')) ||
                          voices.find(v => v.name.includes('Female') && v.lang.startsWith('en')) ||
                          voices.find(v => v.lang.startsWith('en'));
            
            if (voice) utterance.voice = voice;

            // 2. TIMING CALCULATION
            const timeScale = 67; 
            const v = lipsync.wordsToVisemes(line);
            
            // 3. PRE-MAP WORD BOUNDARIES (The Performance Fix)
            // We split by spaces but clean punctuation to match the 'onboundary' charIndex
            const words = line.split(" ");
            let charAcc = 0;
            const wordMap = [];

            words.forEach(word => {
              const start = line.indexOf(word, charAcc);
              const end = start + word.length;
              // Get specific timestamp for the end of THIS word
              const subV = lipsync.wordsToVisemes(line.substring(0, end));
              wordMap.push({
                start: start,
                end: end,
                timestamp: subV.times.length ? subV.times[subV.times.length - 1] * timeScale : 0
              });
              charAcc = end;
            });

            // 4. THE NUDGE (The Sync Fix)
            utterance.onboundary = (event) => {
              if (event.name === 'word') {
                // Find the word in our map that contains this character index
                const match = wordMap.find(m => event.charIndex >= m.start && event.charIndex <= m.end);
                if (match) {
                  head.speakTime = match.timestamp;
                }
              }
            };

            // 5. ANIMATION TRACK CONSTRUCTION
            const animItems = [];
            v.visemes.forEach((vis, i) => {
              const t = v.times[i] * timeScale;
              const d = v.durations[i] * timeScale;
              animItems.push({
                template: { name: 'viseme' },
                ts: [ t - d/2, t, t + d ], 
                vs: { ['viseme_' + vis]: [null, 0.55, 0] } // 0.55 is natural for RPM
              });
            });

            const totalDurationSecs = (v.times[v.times.length - 1] * timeScale) / 1000;
            const dummyBuffer = head.audioCtx.createBuffer(1, Math.max(1, head.audioCtx.sampleRate * (totalDurationSecs + 0.5)), head.audioCtx.sampleRate);

            head.speechQueue.push({
              audio: dummyBuffer,
              words: [{ word: line, start: 0, end: totalDurationSecs * 1000 }],
              anim: animItems 
            });

            if (!head.isSpeaking) head.startSpeaking();
            window.speechSynthesis.speak(utterance);
          }
        } catch (error) {
          console.error("Cross-platform Sync Error:", error);
        }
      }
    });
  });

  </script>
</head>

<body>
  <div id="avatar"></div>
  <div id="controls">

  </div>

</body>
</html>
