<!doctype html>
<html>
  <head>
    <title>Talking Head - minimal example</title>

    <style>
      body,
      html {
        width: 100%;
        height: 100%;
        max-width: 800px;
        margin: auto;
        position: relative;
        background-color: #202020;
        color: white;
      }
      #avatar {
        display: block;
        width: 100%;
        height: 100%;
      }
      #controls {
        display: block;
        position: absolute;
        top: 10px;
        left: 10px;
        right: 10px;
        height: 50px;
      }
      #text {
        position: absolute;
        width: Calc(100% - 110px);
        height: 100%;
        top: 0;
        left: 0;
        bottom: 0;
        right: 110px;
        font-family: Arial;
        font-size: 20px;
      }
      #speak {
        display: block;
        position: absolute;
        top: 0;
        bottom: 0;
        right: 0;
        height: 100%;
        width: 100px;
        font-family: Arial;
        font-size: 20px;
      }
      #loading {
        display: block;
        position: absolute;
        bottom: 10px;
        left: 10px;
        right: 10px;
        height: 50px;
        font-family: Arial;
        font-size: 20px;
      }
      #unlock-shield {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.01);
        z-index: 999;
        display: flex;
        justify-content: center;
        align-items: center;
        cursor: pointer;
      }
    </style>

    <script>
      (function () {
        const hasWV = !!(window.chrome && chrome.webview);
        if (!hasWV) {
          return;
        }
        window.chrome.webview.addEventListener("message", async (event) => {
          let msg = event.data;

          if (typeof msg === "string") {
            try {
              msg = JSON.parse(msg);
            } catch (e) {
              console.error("JSON Parse Error:", e);
              return;
            }
          }

          console.log("Host Message:", msg);

          if (msg.type === "unlock") {
            if (window.head && head.audioCtx) {
              await head.audioCtx.resume();
            }
          }

          if (msg.type === "speak") {
            await speakLine(msg.text);
          }
        });

        window.addEventListener("keydown", async (e) => {
          if (e.key.toLowerCase() === "s") {
            console.log("Manual 'S' pressed");

            if (window.head && head.audioCtx) {
              await head.audioCtx.resume();
            }

            const phrases = [
              "Manual test sequence initiated.",
              "The keyboard bridge is working correctly.",
            ];

            for (const phrase of phrases) {
              await speakLine(phrase);
            }
          }
        });

        window.__notifyHost = function (obj) {
          try {
            sendToHost(obj);
          } catch (e) {
            console.warn("postMessage failed", e);
          }
        };
      })();
    </script>

    <script>
      window.unlockAudio = async function () {
        console.log("[unlockAudio] attempting unlock...");
        try {
          if (window.head && head.audioCtx) {
            if (head.audioCtx.state === "suspended") {
              await head.audioCtx.resume();
              console.log("[unlockAudio] AudioContext resumed");
            }
          }

          if (window.speechSynthesis && typeof SpeechSynthesisUtterance !== 'undefined') {
              window.speechSynthesis.cancel();
              const wakeUp = new SpeechSynthesisUtterance(" ");
              wakeUp.volume = 0;
              window.speechSynthesis.speak(wakeUp);
          }

          const shield = document.getElementById("unlock-shield");
          if (shield) shield.style.display = "none";

          setTimeout(() => {
            if (window.speakLine) {
              window.speakLine("Audio system connected. I am ready.");
            } 
          }, 200);
        } catch (e) {
          console.warn("unlockAudio failed", e);
        }
      };
    </script>

    <script type="importmap">
      {
        "imports": {
          "three": "./three.module.js",
          "three/core": "./three.module.js",
          "three/addons/": "./jsm/",
          "talkinghead": "./talkinghead.js",
          "lipsync-en": "./lipsync-en.js"
        }
      }
    </script>

    <script type="module">
      import { TalkingHead } from "talkinghead";
      import { LipsyncEn } from "lipsync-en";

      let head;
      const lipsync = new LipsyncEn();
      window.stopMouth = function() {
          try {
              if (!window.head) return;
              head.stopSpeaking();
              head.speechQueue = [];
              
              if (head.animator && head.animator.blendshapes) {
                  Object.keys(head.animator.blendshapes).forEach(k => {
                      if (k.startsWith("viseme_")) head.animator.blendshapes[k] = 0;
                  });
              }
          } catch (e) { console.error("Mouth reset failed:", e); }
      };

      function sendToHost(data) {
        try {
            const payload = typeof data === 'string' ? data : JSON.stringify(data);
            
            if (window.chrome && window.chrome.webview) {
                window.chrome.webview.postMessage(payload);
            } else if (window.webkit && window.webkit.messageHandlers) {
                if (window.webkit.messageHandlers.unoWebView) {
                    window.webkit.messageHandlers.unoWebView.postMessage(payload);
                } else if (window.webkit.messageHandlers.bridge) {
                    window.webkit.messageHandlers.bridge.postMessage(payload);
                }
            }
        } catch (err) {
            console.error("Bridge Error:", err);
        }
    }

    window.syncWord = function(word) {
      if (!window.head) return;

      const v = lipsync.wordsToVisemes(word);
      const timeScale = 67;
      const animItems = [];

      v.visemes.forEach((vis, i) => {
          const t = v.times[i] * timeScale;
          const d = v.durations[i] * timeScale;
          animItems.push({
              template: { name: "viseme" },
              ts: [t - d / 2, t, t + d],
              vs: { ["viseme_" + vis]: [null, 0.4, 0] },
          });
      });

      head.speechQueue.push({
          audio: head.audioCtx.createBuffer(1, 1, head.audioCtx.sampleRate),
          words: [{ word: word, start: 0, end: 100 }],
          anim: animItems,
      });
      
      if (!head.isSpeaking) head.startSpeaking();
  };

      async function speakLine(line) {
        
        if (!line || !line.toString().trim()) return;
        const text = line.toString();
        
        try {
          if (window.head && head.audioCtx) {
            if (head.audioCtx.state === "suspended") {
              await head.audioCtx.resume();
            }
          }
        } catch (e) {}

        try {
          const v = lipsync.wordsToVisemes(text);
          if (!v || !v.times || v.times.length === 0) {
            return;
          }

          const timeScale = 67;
          const animItems = [];
          v.visemes.forEach((vis, i) => {
            const t = v.times[i] * timeScale;
            const d = v.durations[i] * timeScale;
            animItems.push({
              template: { name: "viseme" },
              ts: [t - d / 2, t, t + d],
              vs: { ["viseme_" + vis]: [null, 0.4, 0] },
            });
          });

          const totalDurationSecs = (v.times[v.times.length - 1] * timeScale) / 1000;


          if (!(window.speechSynthesis && typeof SpeechSynthesisUtterance !== 'undefined')) {
            sendToHost({ 
              type: "speak_request", 
              text: text
            });
          }

          const startAnimation = () => {
            
            if (head && head.audioCtx) {
              const dummyBuffer = head.audioCtx.createBuffer(
                1,
                Math.max(1, head.audioCtx.sampleRate * (totalDurationSecs + 0.5)),
                head.audioCtx.sampleRate,
              );
              head.speechQueue.push({
                audio: dummyBuffer,
                words: [{ word: text, start: 0, end: totalDurationSecs * 1000 }],
                anim: animItems,
              });
              if (!head.isSpeaking) head.startSpeaking();
            }
          };
          
          startAnimation();

          if (window.speechSynthesis && typeof SpeechSynthesisUtterance !== 'undefined') {
            const startWindowsAudio = () => {
              
              const utterance = new SpeechSynthesisUtterance(text);
              
              let voices = window.speechSynthesis.getVoices() || [];
              const voice =
                voices.find((vv) => (vv.name || "").includes("Enhanced") && (vv.name || "").includes("Samantha")) ||
                voices.find((vv) => (vv.name || "").includes("Samantha")) ||
                voices.find((vv) => (vv.name || "").includes("Zira")) ||
                voices.find((vv) => (vv.name || "").includes("Female") && (vv.lang || "").startsWith("en")) ||
                voices.find((vv) => (vv.lang || "").startsWith("en")) ||
                voices[0];
              if (voice) utterance.voice = voice;

              const words = text.split(" ");
              let charAcc = 0;
              const wordMap = [];
              words.forEach((word) => {
                const start = text.indexOf(word, charAcc);
                const end = start + word.length;
                const subV = lipsync.wordsToVisemes(text.substring(0, end));
                wordMap.push({
                  start: start,
                  end: end,
                  timestamp: subV.times && subV.times.length ? subV.times[subV.times.length - 1] * timeScale : 0,
                });
                charAcc = end;
              });

              utterance.onboundary = (event) => {
                if (event.name === "word") {
                  const match = wordMap.find(m => event.charIndex >= m.start && event.charIndex <= m.end);
                  if (match && head) head.speakTime = match.timestamp;
                }
              };

              window.speechSynthesis.cancel();
              window.speechSynthesis.speak(utterance);
            };
            
            startWindowsAudio();
            
          }
        } catch (err) {
          console.error("[speakLine] error:", err);
        }
      };

      window.avatarReady = false;

      document.addEventListener("DOMContentLoaded", async function () {
        const nodeAvatar = document.getElementById("avatar");
        const nodeLoading = document.getElementById("loading");

        head = new TalkingHead(nodeAvatar, {
          lipsyncModules: ["en"],
          cameraView: "upper",
          ttsEngine: "none",
          ttsEndpoint: "",
        });
        window.head = head;
        head.opt.ttsEndpoint = null;

        var lines = [
          "Hi there! To start with, could you tell me what your name is?",
          "Sure, Adam — could you share your last name with me as well? That’ll help me make sure I have your full name correct.",
          "Thanks, Adam Smith! How was your sleep last night?",
          "Fair enough. Did you wake up feeling rested, or still a bit tired?",
          "I see. Do you often wake up feeling tired, or was last night just an exception?",
        ];

        try {
          nodeLoading.textContent = "Loading...";
          await head.showAvatar(
            {
              url: "brunette.bin",
              body: "F",
              avatarMood: "neutral",
              ttsLang: "en-GB",
              lipsyncLang: "en",
            },
            (ev) => {
              if (ev && ev.lengthComputable) {
                let val = Math.min(
                  100,
                  Math.round((ev.loaded / ev.total) * 100),
                );
                nodeLoading.textContent = "Loading " + val + "%";
              }
            },
          );
          nodeLoading.style.display = "none";
        } catch (error) {
          console.error("showAvatar failed:", error);
          nodeLoading.textContent =
            "Avatar load failed: " +
            (error && error.toString ? error.toString() : String(error));
        }

        window.avatarReady = true;
        console.log("[avatar] READY");
        try {
        } catch (e) {
          console.log("avatar ready");
        }

        if (window.__notifyHost) {
          window.__notifyHost({ type: "avatarReady" });
        }

        setInterval(() => {
          try {
            if (head && head.audioCtx && head.audioCtx.state === "suspended") {
              head.audioCtx.resume();
              console.log("Audio keepalive resume");
            }
          } catch {}
        }, 3000);

        document.addEventListener("keydown", async function (e) {

          if (e.key === "s") {
            try {
              if (
                head &&
                head.audioCtx &&
                head.audioCtx.state === "suspended"
              ) {
                try {
                  await head.audioCtx.resume();
                } catch (e) {
                  /* ignore */
                }
              }
              const line = lines.shift();
              if (line) {
                speakLine(line);
              } 
            } catch (err) {
              console.error("Cross-platform Sync Error:", err);
            }
          }
        });

        document.addEventListener("visibilitychange", function () {
          try {
            if (
              document.visibilityState === "visible" &&
              head &&
              !head.isStarted
            )
              head.start();
          } catch (e) {
            console.warn("visibility error", e);
          }
        });
      });
      window.speakLine = speakLine;
      window.sendToHost = sendToHost;
      window.addEventListener('load', () => {
          setTimeout(() => {
              sendToHost({ type: "avatarReady" });
          }, 250);
      }); 

    </script>
  </head>

  <body>
    <div
      id="unlock-shield"
      onclick="
        this.remove();
        unlockAudio();
      "
    >
      <div
        style="
          background: white;
          padding: 20px;
          border-radius: 10px;
          color: black;
          font-weight: bold;
        "
      >
        Click Avatar to Connect Audio
      </div>
    </div>
    <div id="avatar"></div>
    <div id="controls"></div>
    <div id="loading"></div>
  </body>
</html>
